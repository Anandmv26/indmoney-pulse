name: Weekly Pulse Generation

on:
  schedule:
    # Run at 08:00 UTC (1:30 PM IST) every Monday
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allow manual triggering from GitHub UI

jobs:
  generate-pulse:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline generation
        run: python main.py --generate-only

      - name: Commit and push new payload
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/processed/ outputs/
          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "Auto-generate weekly pulse [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
